server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Trailing-slash-friendly Astro routes
    location / {
        try_files $uri $uri/ $uri/index.html $uri.html =404;
    }

    # Long cache for hashed assets, short for HTML
    location ~* \.(?:js|css|woff2?|ttf|svg|png|jpe?g|webp|avif|gif|ico)$ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(?:html|xml|txt|json)$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Quality-of-life
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml application/rss+xml;
    gzip_min_length 1024;

    # Hide nginx version
    server_tokens off;
}
